<header class="header" [class.scrolled]="isScrolled" role="banner">
  <a href="#main-content" class="skip-link font-mono">Skip to content</a>
  <div class="container">
    <div class="nav">
      <a routerLink="/" class="logo" aria-label="Home">
        <span class="logo-text font-mono">gurpreet<span class="logo-dot">.</span>dev</span>
      </a>

      <nav class="nav-links" role="navigation" aria-label="Main navigation">
        <a *ngFor="let link of navLinks"
           [routerLink]="link.path"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: link.exact }"
           class="nav-link font-mono">
          {{ link.label }}
        </a>
      </nav>

      <div class="nav-actions">
        <button
          (click)="toggleTheme()"
          class="btn btn-ghost theme-toggle"
          [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'"
          type="button">
          <i class="bi" [class]="isDarkMode ? 'bi-sun-fill' : 'bi-moon-fill'"></i>
        </button>

        <button
          (click)="toggleMenu()"
          class="btn btn-ghost menu-toggle"
          [class.active]="isMenuOpen"
          [attr.aria-expanded]="isMenuOpen"
          aria-label="Toggle navigation menu"
          type="button">
          <span class="hamburger" [class.open]="isMenuOpen">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>
      </div>
    </div>

    <div class="mobile-menu" [class.active]="isMenuOpen" role="navigation" aria-label="Mobile navigation">
      <nav class="mobile-nav">
        <a *ngFor="let link of navLinks"
           [routerLink]="link.path"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: link.exact }"
           (click)="closeMenu()"
           class="mobile-link font-mono">
          {{ link.label }}
        </a>
      </nav>
    </div>
  </div>
</header>
